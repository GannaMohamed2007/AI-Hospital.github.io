<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Aura Hospital</title>
    <link rel="stylesheet" href="css/style-light.css" id="theme-style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <img src="images/logo.png" width="60">
        <h1><i class="fas fa-user-plus"></i> Create New Account</h1>
        <button id="toggle-theme" class="theme-btn">Switch Theme</button>
    </header>

    <nav>
        <a href="index.html">Home</a> <a href="doctors.html">Doctors</a> <a href="book-appointment.html">Book</a>
        <a href="feedback.html">Feedback</a> <a href="gallery.html">Gallery</a> <a href="compare-doctors.html">Compare</a>
        <a href="about.html">About</a> <a href="contact.html">Contact</a> <a href="login.html">Login</a> <a href="register.html">Register</a>
    </nav>

    <main class="centered">
        <div class="form-card">
            <h2><i class="fas fa-id-card"></i> Registration Form</h2>
            <form id="register-form">
                <label><i class="fas fa-user"></i> Full Name:</label>
                <input type="text" id="reg-name" placeholder="Your full name">

                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" id="reg-email" placeholder="Your email address">

                <label><i class="fas fa-phone"></i> Phone:</label>
                <input type="tel" id="reg-phone" placeholder="Your phone number">

                <label><i class="fas fa-key"></i> Password:</label>
                <input type="password" id="reg-password" placeholder="Create a password (min 6 characters)">

                <label><i class="fas fa-check-circle"></i> Confirm Password:</label>
                <input type="password" id="reg-confirm" placeholder="Confirm your password">

                <button type="submit"><i class="fas fa-user-check"></i> Register</button>
                <div id="register-message"></div>
            </form>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>

    <footer>
        <p><i class="fas fa-copyright"></i> 2026 Aura Hospital - All Rights Reserved</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
