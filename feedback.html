<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Aura Hospital</title>
    <link rel="stylesheet" href="css/style-light.css" id="theme-style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <img src="images/logo.png" width="60">
        <h1><i class="fas fa-star"></i> Your Feedback Matters</h1>
        <button id="toggle-theme" class="theme-btn">Switch Theme</button>
    </header>

    <nav>
        <a href="index.html">Home</a> <a href="doctors.html">Doctors</a> <a href="book-appointment.html">Book</a>
        <a href="feedback.html">Feedback</a> <a href="gallery.html">Gallery</a> <a href="compare-doctors.html">Compare</a>
        <a href="about.html">About</a> <a href="contact.html">Contact</a> <a href="login.html">Login</a> <a href="register.html">Register</a>
    </nav>

    <main class="centered">
        <div class="form-card">
            <h2><i class="fas fa-comment-dots"></i> Send us your feedback</h2>
            <form id="feedback-form">
                <label><i class="fas fa-user"></i> Name:</label>
                <input type="text" id="feedback-name" placeholder="Your full name">

                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" id="feedback-email" placeholder="Your email address">

                <label><i class="fas fa-comment"></i> Feedback Type:</label>
                <select id="feedback-type">
                    <option value="">-- Select --</option>
                    <option>Suggestion</option><option>Complaint</option><option>Compliment</option><option>Question</option>
                </select>

                <label><i class="fas fa-message"></i> Message:</label>
                <textarea rows="5" id="feedback-msg" placeholder="Write your feedback here..."></textarea>

                <label><i class="fas fa-smile"></i> Rating (1-5):</label>
                <div class="rating-stars">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
                <input type="hidden" id="feedback-rating" value="0">

                <button type="submit">Send Feedback</button>
                <div id="feedback-message"></div>
            </form>
        </div>
    </main>

    <footer>
        <p><i class="fas fa-copyright"></i> 2026 Aura Hospital - All Rights Reserved</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
