<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Aura Hospital</title>
    <link rel="stylesheet" href="css/style-light.css" id="theme-style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <header>
        <img src="images/logo.png" alt="logo" width="60">
        <h1>Book an Appointment</h1>
        <button id="toggle-theme" class="theme-btn">Switch Theme</button>
    </header>

    <nav>
        <a href="index.html">Home</a> <a href="doctors.html">Doctors</a> <a href="book-appointment.html">Book</a>
        <a href="feedback.html">Feedback</a> <a href="gallery.html">Gallery</a> <a href="compare-doctors.html">Compare</a>
        <a href="about.html">About</a> <a href="contact.html">Contact</a> <a href="login.html">Login</a> <a href="register.html">Register</a>
    </nav>

    <main class="centered">
        <div class="form-card">
            <h2><i class="fas fa-calendar-check"></i> Appointment Form</h2>
            <form id="book-form">
                <label><i class="fas fa-user"></i> Full Name:</label>
                <input type="text" id="patient-name" placeholder="Enter your full name">

                <label><i class="fas fa-phone"></i> Phone Number:</label>
                <input type="tel" id="patient-phone" placeholder="Enter your phone">

                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" id="patient-email" placeholder="Enter your email">

                <label><i class="fas fa-calendar-day"></i> Appointment Date:</label>
                <input type="date" id="appointment-date">

                <label><i class="fas fa-clock"></i> Preferred Time:</label>
                <select id="appointment-time">
                    <option value="">-- Select Time --</option>
                    <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
                    <option>2:00 PM</option><option>3:00 PM</option><option>4:00 PM</option>
                </select>

                <label><i class="fas fa-stethoscope"></i> Select Doctor:</label>
                <select id="doctor-select">
                    <option value="">-- Select Doctor --</option>
                    <option value="Ahmed Ali">Dr. Ahmed Ali - Cardiology</option>
                    <option value="Sara Mahmoud">Dr. Sara Mahmoud - Orthopedics</option>
                    <option value="Khaled Hassan">Dr. Khaled Hassan - Pediatrics</option>
                </select>

                <button type="submit"><i class="fas fa-check-circle"></i> Confirm Booking</button>
                <div id="form-message"></div>
            </form>
        </div>
    </main>

    <footer>
        <p><i class="fas fa-copyright"></i> 2026 Aura Hospital - All Rights Reserved</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
